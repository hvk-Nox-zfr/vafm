<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Éditeur d’article</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Content Security Policy minimale pour l'éditeur (sans frame-ancestors) -->
    <meta http-equiv="Content-Security-Policy"
          content="
            default-src 'self';
            script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://esm.sh https://unpkg.com;
            connect-src 'self' https://blronpowdhaumjudtgvn.supabase.co https://*.supabase.co https://cdn.jsdelivr.net https://esm.sh;
            img-src 'self' data: https://blronpowdhaumjudtgvn.supabase.co https://*.supabase.co;
            style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
            font-src 'self' https://cdn.jsdelivr.net;
            base-uri 'self';
          ">

    <link rel="stylesheet" href="editeur.css">
</head>

<script>
if (localStorage.getItem("admin_logged") !== "true") {
    window.location.href = "login.html";
}
</script>

<body class="admin">

<header class="topbar">
    <div class="topbar-left">
        <button id="back-btn" class="btn ghost">← Retour</button>
    </div>
    <div class="topbar-center">
        <h1 id="editor-title">Édition de l’article</h1>
    </div>
    <div class="topbar-right">
        <button id="undo-btn" class="btn ghost">↶ Annuler</button>
        <button id="redo-btn" class="btn ghost">↷ Refaire</button>
        <button id="save-btn" class="btn primary">Enregistrer</button>
    </div>
</header>

<div class="layout">

    <!-- BARRE CANVA -->
    <aside class="canva-sidebar">
        <div class="canva-icon" data-panel="assets">🧩</div>
        <div class="canva-icon" data-panel="images">🖼</div>
        <div class="canva-icon" data-panel="text">✏️</div>
        <div class="canva-icon" data-panel="templates">📄</div>
    </aside>

    <!-- PANNEAUX -->
    <aside class="canva-panel" id="panel-assets">
        <h2>Éléments</h2>
        <input id="element-search" class="search-input" placeholder="Rechercher un élément…">
        <div id="elements-results" class="elements-grid"></div>
    </aside>

    <aside class="canva-panel" id="panel-images">
        <h2>Images</h2>
        <button id="add-image" class="btn full">+ Importer une image</button>
    </aside>

    <aside class="canva-panel" id="panel-text">
        <h2>Texte</h2>
        <button id="add-title" class="btn full">+ Titre</button>
        <button id="add-subtitle" class="btn full">+ Sous-titre</button>
        <button id="add-paragraph" class="btn full">+ Paragraphe</button>
    </aside>

    <aside class="canva-panel" id="panel-templates">
        <h2>Templates</h2>
        <p>À venir…</p>
    </aside>

    <!-- ZONE CENTRALE -->
    <main class="main">
        <div class="canvas-wrapper">

            <!-- COPIE DE LA PAGE PUBLIQUE (structure identique) -->
            <div id="public-page">

                <header class="topbar public-header">
                    <div class="logo">
                        <!-- Ajuste le chemin si nécessaire -->
                        <img src="../logo/VAFM logo rouge.png" alt="Logo de la radio">
                    </div>

                    <a href="index.html" class="logo-home" aria-label="Retour à l'accueil">
                        <svg viewBox="0 0 24 24" class="home-icon" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="stroke-gradient" x1="0%" y1="100%" x2="0%" y2="0%">
                                    <stop offset="0%" stop-color="#ff3366" />
                                    <stop offset="100%" stop-color="#8b5bff" />
                                </linearGradient>
                            </defs>
                            <path d="M3 10L12 3L21 10V21H14V14H10V21H3V10Z" />
                        </svg>
                    </a>

                    <button class="nav-toggle">☰</button>
                </header>

                <!-- Structure publique non imbriquée -->
                <div class="public-main">
                    <div class="canvas-wrapper">
                        <!-- ID attendu par ton JS public -->
                        <div id="actu-content" class="canvas"></div>
                    </div>
                </div>

            </div>

            <!-- CALQUE D'ÉDITION -->
            <div id="editor-layer" class="editor-layer"></div>

        </div>
    </main>

    <!-- PROPRIÉTÉS -->
    <aside class="properties">
        <h2>Propriétés</h2>

        <div id="no-selection-panel">
            <p>Aucun élément sélectionné.</p>
        </div>

        <div id="text-panel" class="prop-panel hidden">
            <h3>Texte</h3>
            <label>Taille</label>
            <input type="number" id="text-font-size">

            <label>Couleur</label>
            <input type="color" id="text-color">

            <label>Alignement</label>
            <div class="btn-group">
                <button data-align="left" class="btn small">←</button>
                <button data-align="center" class="btn small">≡</button>
                <button data-align="right" class="btn small">→</button>
            </div>

            <label>Style</label>
            <div class="btn-group">
                <button data-style="bold" class="btn small">Gras</button>
                <button data-style="italic" class="btn small">Italique</button>
                <button data-style="underline" class="btn small">Souligné</button>
            </div>
        </div>

        <div id="image-panel" class="prop-panel hidden">
            <h3>Image</h3>
            <label>Largeur</label>
            <input type="range" id="img-frame-width">

            <label>Hauteur</label>
            <input type="range" id="img-frame-height">
        </div>
    </aside>

</div>

<!-- SCRIPTS : charger les modules après le DOM -->
<script type="module" src="editeur.js"></script>
<script type="module" src="supabase-init.js"></script>

<!-- Inline script corrigé -->
<script>
    const icons = document.querySelectorAll(".canva-icon");
    const panels = document.querySelectorAll(".canva-panel");

    icons.forEach(icon => {
        const panel = document.getElementById("panel-" + icon.dataset.panel);
        icon.addEventListener("mouseenter", () => {
            panels.forEach(p => p.classList.remove("open"));
            if (panel) panel.classList.add("open");
        });
    });

    panels.forEach(panel => {
        panel.addEventListener("mouseleave", () => {
            panel.classList.remove("open");
        });
    });
</script>

</body>
</html>
