<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Éditeur d’article</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="editeur.css">
</head>

<script>
if (localStorage.getItem("admin_logged") !== "true") {
    window.location.href = "login.html";
}
</script>

<body class="admin">

<header class="topbar">
    <div class="topbar-left">
        <button id="back-btn" class="btn ghost">← Retour</button>
    </div>
    <div class="topbar-center">
        <h1 id="editor-title">Édition de l’article</h1>
    </div>
    <div class="topbar-right">
        <button id="undo-btn" class="btn ghost">↶ Annuler</button>
        <button id="redo-btn" class="btn ghost">↷ Refaire</button>
        <button id="save-btn" class="btn primary">Enregistrer</button>
    </div>
</header>

<div class="layout">

    <!-- BARRE LATERALE TYPE CANVA -->
    <aside class="canva-sidebar">
        <div class="canva-icon" data-panel="assets" title="Éléments">
            🧩
        </div>
        <div class="canva-icon" data-panel="images" title="Images">
            🖼
        </div>
        <div class="canva-icon" data-panel="text" title="Texte">
            ✏️
        </div>
        <div class="canva-icon" data-panel="templates" title="Templates">
            📄
        </div>
    </aside>

    <!-- PANNEAUX DÉROULANTS LIES AUX ICONES -->
    <aside class="canva-panel" id="panel-assets">
        <h2>Éléments</h2>
        <input id="element-search" class="search-input" placeholder="Rechercher un élément…">
        <div id="elements-results" class="elements-grid"></div>
    </aside>

    <aside class="canva-panel" id="panel-images">
        <h2>Images</h2>
        <button id="add-image" class="btn full">+ Importer une image</button>
    </aside>

    <aside class="canva-panel" id="panel-text">
        <h2>Texte</h2>
        <button id="add-title" class="btn full">+ Titre</button>
        <button id="add-subtitle" class="btn full">+ Sous-titre</button>
        <button id="add-paragraph" class="btn full">+ Paragraphe</button>
    </aside>

    <aside class="canva-panel" id="panel-templates">
        <h2>Templates</h2>
        <p>À venir…</p>
    </aside>

    <!-- ZONE CENTRALE : PAGE PUBLIQUE + CALQUE D'ÉDITION -->
    <main class="main">
        <div class="canvas-wrapper">
            <!-- PAGE PUBLIQUE (copie de ta page réelle) -->
            <div id="public-page" class="canvas">
                <!-- header / logo / etc. -->
                <header class="public-header">
                    <img src="logo-vafm.png" alt="VAFM" class="public-logo">
                    <a href="/" class="public-home">🏠</a>
                </header>

                <!-- zone texte article -->
                <div id="editor-area" class="public-content"></div>
            </div>

            <!-- CALQUE D'ÉDITION POUR LES BLOCS -->
            <div id="editor-layer" class="editor-layer"></div>
        </div>
    </main>

    <!-- PANNEAU DE PROPRIÉTÉS -->
    <aside class="properties">
        <h2>Propriétés</h2>

        <div id="no-selection-panel">
            <p>Aucun élément sélectionné.</p>
        </div>

        <div id="text-panel" class="prop-panel hidden">
            <h3>Texte</h3>
            <label>Taille</label>
            <input type="number" id="text-font-size" min="8" max="80" value="18">

            <label>Couleur</label>
            <input type="color" id="text-color" value="#000000">

            <label>Alignement</label>
            <div class="btn-group">
                <button data-align="left" class="btn small">←</button>
                <button data-align="center" class="btn small">≡</button>
                <button data-align="right" class="btn small">→</button>
            </div>

            <label>Style</label>
            <div class="btn-group">
                <button data-style="bold" class="btn small">Gras</button>
                <button data-style="italic" class="btn small">Italique</button>
                <button data-style="underline" class="btn small">Souligné</button>
            </div>
        </div>

        <div id="image-panel" class="prop-panel hidden">
            <h3>Image</h3>
            <label>Largeur du cadre</label>
            <input type="range" id="img-frame-width" min="100" max="800" value="200">

            <label>Hauteur du cadre</label>
            <input type="range" id="img-frame-height" min="80" max="600" value="150">

            <p style="margin-top:10px;">Mode rognage :</p>
            <p class="hint">Clique sur “✂️ Rogner l’image”, puis déplace l’image dans le cadre.</p>
        </div>
    </aside>

</div>

<script type="module" src="editeur.js"></script>
<script type="module" src="supabase-init.js"></script>

<script>
    // ouverture au survol façon Canva
    const icons = document.querySelectorAll(".canva-icon");
    const panels = document.querySelectorAll(".canva-panel");

    icons.forEach(icon => {
        const panelId = icon.dataset.panel;
        const panel = document.getElementById("panel-" + panelId);

        icon.addEventListener("mouseenter", () => {
            panels.forEach(p => p.classList.remove("open"));
            panel.classList.add("open");
        });
    });

    // fermer quand on sort de la zone panel + sidebar
    panels.forEach(panel => {
        panel.addEventListener("mouseleave", () => {
            panel.classList.remove("open");
        });
    });
</script>

</body>
</html>
