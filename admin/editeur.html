<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Éditeur d’article</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- Content Security Policy minimale pour l'éditeur -->
  <meta http-equiv="Content-Security-Policy"
        content="
          default-src 'self';
          script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://esm.sh https://unpkg.com;
          connect-src 'self' https://blronpowdhaumjudtgvn.supabase.co https://*.supabase.co https://cdn.jsdelivr.net https://esm.sh;
          img-src 'self' data: https://blronpowdhaumjudtgvn.supabase.co https://*.supabase.co;
          style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
          font-src 'self' https://cdn.jsdelivr.net;
          base-uri 'self';
        ">

  <!-- Feuilles de style externes -->
  <link rel="stylesheet" href="editeur.css">
</head>

<body class="admin">

  <!-- Auth client simple : géré par editeur.js (aucun script inline ici) -->

  <header class="topbar" role="banner">
    <div class="topbar-left">
      <button id="back-btn" class="btn ghost" aria-label="Retour">← Retour</button>
    </div>

    <div class="topbar-center" role="heading" aria-level="1">
      <h1 id="editor-title">Édition de l’article</h1>
    </div>

    <div class="topbar-right">
      <button id="undo-btn" class="btn ghost" aria-label="Annuler">↶ Annuler</button>
      <button id="redo-btn" class="btn ghost" aria-label="Refaire">↷ Refaire</button>
      <button id="save-btn" class="btn primary" aria-label="Enregistrer">Enregistrer</button>
    </div>
  </header>

  <div class="layout" role="application">

    <!-- BARRE CANVA (icônes) -->
    <aside class="canva-sidebar" aria-label="Barre d'outils">
      <button class="canva-icon" data-panel="assets" title="Éléments" aria-label="Éléments">🧩</button>
      <button class="canva-icon" data-panel="images" title="Images" aria-label="Images">🖼</button>
      <button class="canva-icon" data-panel="text" title="Texte" aria-label="Texte">✏️</button>
      <button class="canva-icon" data-panel="templates" title="Templates" aria-label="Templates">📄</button>
    </aside>

    <!-- PANNEAUX DÉROULANTS (contenu géré par CSS/JS externes) -->
    <aside class="canva-panel" id="panel-assets" aria-hidden="true">
      <h2>Éléments</h2>
      <input id="element-search" class="search-input" placeholder="Rechercher un élément…" aria-label="Rechercher un élément">
      <div id="elements-results" class="elements-grid" role="list"></div>
    </aside>

    <aside class="canva-panel" id="panel-images" aria-hidden="true">
      <h2>Images</h2>
      <button id="add-image" class="btn full">+ Importer une image</button>
    </aside>

    <aside class="canva-panel" id="panel-text" aria-hidden="true">
      <h2>Texte</h2>
      <button id="add-title" class="btn full">+ Titre</button>
      <button id="add-subtitle" class="btn full">+ Sous-titre</button>
      <button id="add-paragraph" class="btn full">+ Paragraphe</button>
    </aside>

    <aside class="canva-panel" id="panel-templates" aria-hidden="true">
      <h2>Templates</h2>
      <p>À venir…</p>
    </aside>

    <!-- ZONE CENTRALE : aperçu public + calque d'édition -->
    <main class="main" role="main">
      <div class="canvas-wrapper" id="main-canvas-wrapper">

        <!-- PAGE PUBLIQUE (aperçu) -->
        <section id="public-page" class="canvas" aria-label="Aperçu public">
          <div id="actu-content" class="public-content" aria-live="polite">
            <h2>Titre de l’article</h2>
            <p>Paragraphe d’introduction. Utilise la barre à gauche pour ajouter du texte ou des images.</p>
          </div>
        </section>

        <!-- CALQUE D'ÉDITION (au-dessus de l'aperçu) -->
        <div id="editor-layer" class="editor-layer" aria-hidden="false"></div>
      </div>
    </main>

  </div>

  <!-- Scripts externes (aucun JS inline) -->
  <script type="module" src="supabase-init.js"></script>
  <script type="module" src="editeur.js"></script>

</body>
</html>
