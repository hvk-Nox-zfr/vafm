<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Éditeur d’article — VAFM</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <meta http-equiv="Content-Security-Policy"
        content="
          default-src 'self';
          script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://esm.sh https://unpkg.com;
          connect-src 'self' https://blronpowdhaumjudtgvn.supabase.co https://*.supabase.co https://cdn.jsdelivr.net https://esm.sh;
          img-src 'self' data: https://blronpowdhaumjudtgvn.supabase.co https://*.supabase.co;
          style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
          font-src 'self' https://cdn.jsdelivr.net;
          base-uri 'self';
        ">

  <link rel="stylesheet" href="./editeur.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script type="module" src="./editeur.js" defer></script>
</head>

<body class="editor admin">

  <!-- Top floating toolbar -->
  <header id="format-toolbar" class="format-toolbar" role="toolbar" aria-label="Barre de mise en forme">
    <div class="toolbar-left">
      <button id="undo-btn" class="ft-btn" title="Annuler" aria-label="Annuler">↶</button>
      <button id="redo-btn" class="ft-btn" title="Rétablir" aria-label="Rétablir">↷</button>

      <div class="divider"></div>

      <select id="ft-font" class="ft-control" aria-label="Police">
        <option value="Inter, system-ui, sans-serif">Inter</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="Times New Roman, serif">Times</option>
        <option value="Arial, Helvetica, sans-serif">Arial</option>
      </select>

      <select id="ft-size" class="ft-control" aria-label="Taille">
        <option value="14px">14</option>
        <option value="16px" selected>16</option>
        <option value="18px">18</option>
        <option value="20px">20</option>
      </select>

      <div class="divider"></div>

      <button id="ft-bold" class="ft-btn" aria-pressed="false" title="Gras" aria-label="Gras">B</button>
      <button id="ft-italic" class="ft-btn" aria-pressed="false" title="Italique" aria-label="Italique">I</button>
      <button id="ft-underline" class="ft-btn" aria-pressed="false" title="Souligné" aria-label="Souligné">U</button>

      <input id="ft-color" class="ft-color" type="color" title="Couleur du texte" aria-label="Couleur du texte">
    </div>

    <div class="toolbar-right">
      <button id="toggle-grid" class="ft-btn" title="Afficher la grille" aria-pressed="false" aria-label="Afficher la grille">▦</button>
      <button id="toggle-snap" class="ft-btn" title="Activer l'accrochage" aria-pressed="false" aria-label="Activer l'accrochage">⤓</button>

      <div class="divider"></div>

      <label for="zoom" class="sr-only">Zoom</label>
      <input id="zoom" type="range" min="50" max="200" value="100" aria-label="Zoom" class="zoom-range">

      <button id="preview-btn" class="ft-btn" title="Aperçu public" aria-label="Aperçu public">👁</button>
      <button id="save-btn" class="ft-btn primary" title="Enregistrer" aria-label="Enregistrer">💾</button>
    </div>
  </header>

  <div class="layout" role="application">

    <!-- Left vertical toolbar -->
    <aside class="canva-sidebar" aria-label="Barre d'outils">
      <button class="canva-icon" data-panel="assets" title="Éléments" aria-label="Éléments">🧩</button>
      <button class="canva-icon" data-panel="images" title="Images" aria-label="Images">🖼</button>
      <button class="canva-icon" data-panel="text" title="Texte" aria-label="Texte">✏️</button>
      <button class="canva-icon" data-panel="shapes" title="Formes" aria-label="Formes">⬡</button>
      <button class="canva-icon" data-panel="templates" title="Templates" aria-label="Templates">📄</button>
    </aside>

    <!-- Panels -->
    <aside class="canva-panel" id="panel-assets" aria-hidden="true" aria-label="Panneau éléments">
      <h3>Éléments</h3>
      <input id="element-search" class="search-input" placeholder="Rechercher un élément…" aria-label="Rechercher un élément">
      <div id="elements-results" class="elements-grid" aria-live="polite"></div>
    </aside>

    <aside class="canva-panel" id="panel-images" aria-hidden="true" aria-label="Panneau images">
      <h3>Images</h3>
      <button id="add-image" class="btn full">+ Importer une image</button>
      <div id="images-list" class="elements-grid"></div>
    </aside>

    <aside class="canva-panel" id="panel-text" aria-hidden="true" aria-label="Panneau texte">
      <h3>Texte</h3>
      <button id="add-floating-text" class="btn full">+ Zone de texte</button>
      <button id="add-heading" class="btn full">+ Titre</button>
    </aside>

    <aside class="canva-panel" id="panel-templates" aria-hidden="true" aria-label="Panneau templates">
      <h3>Templates</h3>
      <div class="templates-grid"></div>
    </aside>

    <!-- Main canvas area -->
    <main class="main" role="main" aria-label="Zone d'édition">
      <div class="canvas-toolbar" aria-hidden="true">
        <div class="breadcrumbs">Article › Édition</div>
      </div>

      <div class="canvas-wrapper" id="main-canvas-wrapper">
        <!-- simulated public page container -->
        <section id="editor-page" data-editor="1" class="canvas public-content" tabindex="0" aria-label="Aperçu article">
          <div class="page-surface">
            <h1 class="page-title">Titre de l’article</h1>
            <p class="page-intro">Paragraphe d’introduction. Utilise la barre à gauche pour ajouter du texte ou des images.</p>

            <!-- floating elements will be appended here -->
          </div>
        </section>

        <!-- editor overlay for handles, selection, decorations -->
        <div id="editor-layer" class="editor-layer" aria-hidden="false"></div>
      </div>
    </main>

    <!-- Right properties panel -->
    <aside class="properties-panel" aria-label="Propriétés">
      <div class="properties-header">
        <h4>Propriétés</h4>
        <button id="close-properties" class="ft-btn" aria-label="Fermer panneau">✕</button>
      </div>

      <div id="properties-content" class="properties-content">
        <p class="muted">Sélectionne un élément pour modifier ses propriétés.</p>

        <div class="prop-group" data-prop="position">
          <label>Position</label>
          <div class="prop-row">
            <input id="prop-left" type="number" step="1" placeholder="left (px)" aria-label="Position gauche">
            <input id="prop-top" type="number" step="1" placeholder="top (px)" aria-label="Position haut">
          </div>
        </div>

        <div class="prop-group" data-prop="size">
          <label>Taille</label>
          <div class="prop-row">
            <input id="prop-width" type="number" step="1" placeholder="width (px)" aria-label="Largeur">
            <input id="prop-height" type="number" step="1" placeholder="height (px)" aria-label="Hauteur">
          </div>
        </div>

        <div class="prop-group" data-prop="style">
          <label>Style</label>
          <div class="prop-row">
            <input id="prop-fontsize" type="number" step="1" placeholder="font-size (px)" aria-label="Taille de police">
            <input id="prop-color" type="color" aria-label="Couleur">
          </div>
        </div>

        <div class="prop-actions">
          <button id="bring-front" class="btn full">Mettre au premier plan</button>
          <button id="send-back" class="btn full">Mettre en arrière</button>
        </div>
      </div>
    </aside>

  </div>

  <!-- Floating save button -->
  <button id="save-btn-top" class="btn primary save-top" title="Enregistrer">Enregistrer</button>

  <!-- Hidden file input for images -->
  <input type="file" id="hidden-image-input" accept="image/*" style="display:none" aria-hidden="true">

  <!-- Small helper: keyboard hints -->
  <div class="keyboard-hints" aria-hidden="true">
    <span class="kbd">Del</span> Supprimer • <span class="kbd">Ctrl</span> + Z Annuler • <span class="kbd">Ctrl</span> + Y Rétablir
  </div>

</body>
</html>
