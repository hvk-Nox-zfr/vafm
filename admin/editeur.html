<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Éditeur d’article</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- Content Security Policy minimale pour l'éditeur -->
  <meta http-equiv="Content-Security-Policy"
        content="
          default-src 'self';
          script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://esm.sh https://unpkg.com;
          connect-src 'self' https://blronpowdhaumjudtgvn.supabase.co https://*.supabase.co https://cdn.jsdelivr.net https://esm.sh;
          img-src 'self' data: https://blronpowdhaumjudtgvn.supabase.co https://*.supabase.co;
          style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
          font-src 'self' https://cdn.jsdelivr.net;
          base-uri 'self';
        ">

  <link rel="stylesheet" href="editeur.css" />

  <!-- Overrides rapides pour garantir le layout après suppression du panneau propriétés -->
  <style>
    /* Layout : sidebar (56px) + zone principale */
    body.admin .layout {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 12px;
      height: calc(100vh - 56px);
    }

    /* Assurer que la zone principale occupe tout l'espace */
    body.admin .main { overflow: auto; }
    .canvas-wrapper {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
      box-sizing: border-box;
      overflow: auto;
    }

    .canvas {
      width: 100%;
      max-width: 1200px;
      min-width: 720px;
      min-height: 600px;
      background: #fff;
      padding: 24px;
      border-radius: 8px;
      box-sizing: border-box;
      position: relative;
      overflow: visible;
    }

    /* editor-layer doit recouvrir la canvas */
    #editor-layer {
      position: absolute;
      inset: 0;
      pointer-events: auto;
      z-index: 9999;
      background: transparent;
    }
  </style>
</head>

<body class="admin">

  <script>
    // simple auth redirect (client-side)
    if (localStorage.getItem('admin_logged') !== 'true') {
      window.location.replace('login.html');
    }
  </script>

  <header class="topbar" role="banner">
    <div class="topbar-left">
      <button id="back-btn" class="btn ghost" aria-label="Retour">← Retour</button>
    </div>

    <div class="topbar-center" role="heading" aria-level="1">
      <h1 id="editor-title">Édition de l’article</h1>
    </div>

    <div class="topbar-right">
      <button id="undo-btn" class="btn ghost" aria-label="Annuler">↶ Annuler</button>
      <button id="redo-btn" class="btn ghost" aria-label="Refaire">↷ Refaire</button>
      <button id="save-btn" class="btn primary" aria-label="Enregistrer">Enregistrer</button>
    </div>
  </header>

  <div class="layout" role="application">

    <!-- BARRE CANVA (icônes) -->
    <aside class="canva-sidebar" aria-label="Barre d'outils">
      <button class="canva-icon" data-tool="assets" title="Éléments" aria-label="Éléments">🧩</button>
      <button class="canva-icon" data-tool="images" title="Images" aria-label="Images">🖼</button>
      <button class="canva-icon" data-tool="text" title="Texte" aria-label="Texte">✏️</button>
      <button class="canva-icon" data-tool="templates" title="Templates" aria-label="Templates">📄</button>
    </aside>

    <!-- ZONE CENTRALE : aperçu public + calque d'édition -->
    <main class="main" role="main">
      <!-- Wrapper unique : contient la page publique ET le calque d'édition -->
      <div class="canvas-wrapper" id="main-canvas-wrapper">

        <!-- PAGE PUBLIQUE (aperçu) -->
        <section id="public-page" class="canvas" aria-label="Aperçu public">
          <div id="actu-content" class="public-content" aria-live="polite">
            <h2>Titre de l’article</h2>
            <p>Paragraphe d’introduction. Utilise la barre à gauche pour ajouter du texte ou des images.</p>
          </div>
        </section>

        <!-- CALQUE D'ÉDITION (au-dessus de l'aperçu) -->
        <div id="editor-layer" class="editor-layer" aria-hidden="false"></div>
      </div>
    </main>

  </div>

  <!-- SCRIPTS : supabase-init d'abord si tu veux exposer window.supabase, puis editeur.js -->
  <script type="module" src="supabase-init.js"></script>
  <script type="module" src="editeur.js"></script>

  <!-- Inline : comportement des icônes (léger, non bloquant) -->
  <script>
    (function () {
      const icons = document.querySelectorAll('.canva-icon');

      // panels are removed for now; icons trigger actions directly in editeur.js
      icons.forEach(icon => {
        icon.addEventListener('click', () => {
          const tool = icon.dataset.tool;
          // dispatch a custom event so editeur.js can handle it
          document.dispatchEvent(new CustomEvent('canva-tool', { detail: { tool } }));
        });
      });

      // Safety: if editor-layer was injected elsewhere, move it into the wrapper
      document.addEventListener('DOMContentLoaded', () => {
        const wrapper = document.getElementById('main-canvas-wrapper');
        const layer = document.getElementById('editor-layer');
        if (wrapper && layer && layer.parentElement !== wrapper) {
          wrapper.appendChild(layer);
          Object.assign(layer.style, {
            position: 'absolute',
            top: '0',
            left: '0',
            right: '0',
            bottom: '0',
            pointerEvents: 'auto',
            zIndex: '9999'
          });
          console.log('editor-layer repositionné dans canvas-wrapper');
        }
      });
    })();
  </script>

</body>
</html>
